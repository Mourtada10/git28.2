<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <section class="featured">
        <p class="mini-title">NOTRE SELECTION</p>
        <h1>Produits en vedette</h1>
        <p class="subtitle">
            Des pièces soigneusement sélectionnées pour vous offrir<br> le meilleur du style contemporain.
        </p>

        <div class="categories">
            <button class="active">Tous</button>
            <button>Chaussures</button>
            <button>Accessoires</button>
            <button>Montres</button>
            <button>Beauté</button>
            <button>Vêtements</button>
        </div>
    </section>

    <section class="product-grid">
        <div class="product-card">
            <div class="image-container">
                <span class="badge promo">PROMO</span>
                <button class="wishlist">❤️</button>
                <img src="sneakers.jpg">
            </div>
            <div class="product-info">
                <p class="category">CHAUSSURES</p>
                <h3 class="product-name">Sneakers Air Edition</h3>
                <div class="price-row">
                    <span class="current-price">189 €</span>
                    <span class="old-price">249 €</span>
                    <span class="discount">-24%</span>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <span class="badge bestseller">BEST-SELLER</span>
                <button class="wishlist">❤️</button>
                <img src="sac a cuire.jpg">
            </div>
            <div class="product-info">
                <p class="category">ACCESSOIRES</p>
                <h3 class="product-name">Sac Cuir Milano</h3>
                <p class="current-price">320 €</p>
            </div>
        </div>

        <div class="product-card">
            <div class="image-container">
                <span class="badge nouveau">NOUVEAU</span>
                <button class="wishlist">❤️</button>
                <img src="lunette.jpg">
            </div>
            <div class="product-info">
                <p class="category">ACCESSOIRES</p>
                <h3 class="product-name">Lunettes Riviera</h3>
                <p class="current-price">145 €</p>
            </div>
        </div>
    </section>
</body>

</html>
